# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - backend-ai

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install and generate Prisma client
        run: |
          npm install
          echo "🔍 Checking DATABASE_URL..."
          echo "DATABASE_URL is set: $([[ -n "$DATABASE_URL" ]] && echo "YES" || echo "NO")"
          echo "🚀 Generating Prisma client..."
          npm run prisma:generate
          echo "✅ Prisma generation complete, checking output..."
          ls -la node_modules/.prisma/ || echo "❌ Prisma client directory not found"
          ls -la node_modules/@prisma/client/ || echo "❌ @prisma/client directory not found"
          echo "📦 Ensuring Prisma client is included in artifact..."
          find node_modules/.prisma -type f | head -10 || echo "No .prisma files found"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: ${{ secrets.NODE_ENV }}

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'backend-ai'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_C350260C8CB34A0EBD30B846C861A1EC }}

      - name: Test deployment
        run: |
          sleep 30
          curl -f https://backend-ai.azurewebsites.net/api/health || exit 1
